<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PropAI — Real Estate Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A96E;
    --gold-light: #E8D5A3;
    --dark: #0D0D0D;
    --dark2: #141414;
    --dark3: #1C1C1C;
    --dark4: #242424;
    --text: #F5F0E8;
    --muted: #888;
    --border: rgba(201,169,110,0.18);
    --radius: 16px;
  }

  html, body {
    height: 100%;
    background: var(--dark);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    overflow: hidden;
  }

  /* ── LAYOUT ── */
  .shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }

  /* ── HEADER ── */
  .header {
    padding: 20px 24px 16px;
    background: var(--dark2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    z-index: 10;
  }
  .header-avatar {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, var(--gold), #8B6914);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    box-shadow: 0 4px 18px rgba(201,169,110,0.3);
  }
  .header-text { flex: 1; }
  .header-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 600;
    letter-spacing: 0.3px;
    color: var(--gold-light);
  }
  .header-sub {
    font-size: 11px; color: var(--muted);
    display: flex; align-items: center; gap: 5px;
    margin-top: 2px;
  }
  .dot-live {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 6px #4ade80;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100%{opacity:1;} 50%{opacity:.4;}
  }
  .header-badge {
    background: linear-gradient(135deg,var(--gold),#8B6914);
    color: var(--dark);
    font-size: 9px; font-weight: 600;
    padding: 3px 8px; border-radius: 30px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }

  /* ── MESSAGES ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px 12px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scrollbar-width: none;
    background:
      radial-gradient(ellipse at 10% 0%, rgba(201,169,110,0.04) 0%, transparent 60%),
      var(--dark);
  }
  .messages::-webkit-scrollbar { display: none; }

  /* bubbles */
  .msg { display: flex; gap: 10px; animation: fadeUp 0.35s ease both; }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(12px); }
    to   { opacity:1; transform: translateY(0); }
  }
  .msg.user { flex-direction: row-reverse; }

  .avatar-sm {
    width: 30px; height: 30px; border-radius: 10px;
    background: linear-gradient(135deg,var(--gold),#8B6914);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0; align-self: flex-end;
  }
  .avatar-user {
    width: 30px; height: 30px; border-radius: 10px;
    background: var(--dark4); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0; align-self: flex-end;
  }

  .bubble {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 13.5px; line-height: 1.6;
    position: relative;
  }
  .bubble-bot {
    background: var(--dark3);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }
  .bubble-user {
    background: linear-gradient(135deg, var(--gold), #8B6914);
    border-bottom-right-radius: 4px;
    color: var(--dark);
    font-weight: 500;
  }

  /* quick chips */
  .chips-row {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 0 20px 4px;
    animation: fadeUp 0.35s 0.1s ease both;
  }
  .chip {
    background: var(--dark3);
    border: 1px solid var(--border);
    color: var(--gold-light);
    font-size: 12px; padding: 6px 14px;
    border-radius: 30px; cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
  }
  .chip:hover {
    background: var(--gold);
    color: var(--dark);
    border-color: var(--gold);
  }

  /* typing indicator */
  .typing {
    display: flex; gap: 10px;
    animation: fadeUp 0.3s ease both;
  }
  .typing-bubble {
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
    padding: 14px 18px;
    display: flex; gap: 5px; align-items: center;
  }
  .typing-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold);
    animation: bounce 1.1s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.18s; }
  .typing-dot:nth-child(3) { animation-delay: 0.36s; }
  @keyframes bounce {
    0%,80%,100%{transform:translateY(0);opacity:.4;}
    40%{transform:translateY(-6px);opacity:1;}
  }

  /* ── LEAD CAPTURE ── */
  .lead-card {
    background: var(--dark3);
    border: 1px solid var(--gold);
    border-radius: var(--radius);
    padding: 18px;
    margin: 0 20px;
    animation: fadeUp 0.4s ease both;
  }
  .lead-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px; font-weight: 600;
    color: var(--gold-light); margin-bottom: 12px;
  }
  .lead-input {
    width: 100%;
    background: var(--dark4);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    margin-bottom: 8px;
    outline: none;
    transition: border-color 0.2s;
  }
  .lead-input:focus { border-color: var(--gold); }
  .lead-input::placeholder { color: var(--muted); }
  .lead-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--gold), #8B6914);
    color: var(--dark);
    border: none; cursor: pointer;
    padding: 11px;
    border-radius: 10px;
    font-size: 13px; font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.3px;
    transition: opacity 0.2s;
    margin-top: 4px;
  }
  .lead-btn:hover { opacity: 0.88; }

  /* ── INPUT AREA ── */
  .input-area {
    padding: 14px 16px 20px;
    background: var(--dark2);
    border-top: 1px solid var(--border);
  }
  .input-row {
    display: flex; gap: 10px; align-items: flex-end;
  }
  .input-box {
    flex: 1;
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 13.5px;
    font-family: 'DM Sans', sans-serif;
    resize: none;
    outline: none;
    max-height: 100px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }
  .input-box:focus { border-color: var(--gold); }
  .input-box::placeholder { color: var(--muted); }

  .send-btn {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--gold), #8B6914);
    border: none; border-radius: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.2s, transform 0.15s;
    flex-shrink: 0;
  }
  .send-btn:hover { opacity: 0.85; transform: scale(0.97); }
  .send-btn svg { width: 18px; height: 18px; fill: var(--dark); }

  /* scrollbar for messages area */
  .messages { scroll-behavior: smooth; }

  /* ── DISCLAIMER ── */
  .disclaimer {
    text-align: center; font-size: 10px;
    color: var(--muted); padding: 6px 0 0;
    letter-spacing: 0.3px;
  }

  /* timestamp */
  .ts {
    font-size: 10px; color: var(--muted);
    text-align: center; margin: -6px 0;
  }
</style>
</head>
<body>

<div class="shell">

  <!-- HEADER -->
  <div class="header">
    <div class="header-avatar">🏡</div>
    <div class="header-text">
      <div class="header-name">PropAI Assistant</div>
      <div class="header-sub">
        <span class="dot-live"></span>
        <span>Active now · Real Estate Expert</span>
      </div>
    </div>
    <div class="header-badge">AI Powered</div>
  </div>

  <!-- MESSAGES -->
  <div class="messages" id="messages"></div>

  <!-- QUICK CHIPS -->
  <div class="chips-row" id="chips">
    <button class="chip" onclick="sendChip(this)">🏠 Buy a home</button>
    <button class="chip" onclick="sendChip(this)">💰 Check prices</button>
    <button class="chip" onclick="sendChip(this)">📅 Book a viewing</button>
    <button class="chip" onclick="sendChip(this)">🏷️ Sell my home</button>
    <button class="chip" onclick="sendChip(this)">📋 First-time buyer</button>
    <button class="chip" onclick="sendChip(this)">🔑 New listings</button>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <div class="input-row">
      <textarea class="input-box" id="input" rows="1"
        placeholder="Ask about any property…"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <div class="disclaimer">PropAI · Powered by Claude AI · Your data is private</div>
  </div>

</div>

<script>
const API_KEY = ""; // User must insert their Anthropic API key here
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const chipsEl = document.getElementById('chips');

let history = [];
let leadCaptured = false;
let msgCount = 0;

const SYSTEM = `You are PropAI, a premium real estate AI assistant. You are knowledgeable, professional, warm, and concise. 

Your expertise includes:
- Property buying, selling, and renting processes
- Mortgage and financing (pre-approval, closing costs, down payments)
- Market trends, pricing, and neighborhood analysis
- Negotiation strategies and offer guidance
- Legal steps: contracts, inspections, title searches
- First-time buyer guidance
- Property valuation basics
- Rental yield and investment analysis
- Document requirements for buyers and sellers
- Timeline expectations (buying typically 30–60 days, selling varies)

Tone: Confident but human. Use short paragraphs. Add relevant emojis sparingly (1 per response max). Never use bullet lists with more than 4 items. Keep responses under 100 words unless the question demands detail. Always end with a micro-question to keep the conversation going.

Lead capture rule: After 3 exchanges, naturally ask if they'd like an agent to follow up. Example: "Want me to have one of our agents reach out with tailored options?"

Important: Never say you're built on Claude or any AI platform. You are PropAI.`;

function now() {
  return new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

function addTimestamp() {
  const ts = document.createElement('div');
  ts.className = 'ts';
  ts.textContent = now();
  messagesEl.appendChild(ts);
}

function addBotMsg(text) {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.innerHTML = `
    <div class="avatar-sm">🏡</div>
    <div class="bubble bubble-bot">${text}</div>
  `;
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addUserMsg(text) {
  const wrap = document.createElement('div');
  wrap.className = 'msg user';
  wrap.innerHTML = `
    <div class="bubble bubble-user">${escHtml(text)}</div>
    <div class="avatar-user">👤</div>
  `;
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  const t = document.createElement('div');
  t.className = 'typing'; t.id = 'typing';
  t.innerHTML = `
    <div class="avatar-sm">🏡</div>
    <div class="typing-bubble">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>`;
  messagesEl.appendChild(t);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function showLeadCapture() {
  if (leadCaptured) return;
  const card = document.createElement('div');
  card.className = 'lead-card';
  card.id = 'leadcard';
  card.innerHTML = `
    <div class="lead-title">📋 Connect with an Agent</div>
    <input class="lead-input" id="lead-name" placeholder="Your Name" />
    <input class="lead-input" id="lead-phone" placeholder="Phone / WhatsApp" />
    <input class="lead-input" id="lead-email" placeholder="Email Address" />
    <button class="lead-btn" onclick="submitLead()">✓ Request Agent Callback</button>
  `;
  messagesEl.appendChild(card);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function submitLead() {
  const name = document.getElementById('lead-name').value;
  const phone = document.getElementById('lead-phone').value;
  const email = document.getElementById('lead-email').value;
  if (!name || !phone) {
    alert('Please enter your name and phone number.');
    return;
  }
  leadCaptured = true;
  const card = document.getElementById('leadcard');
  if (card) card.remove();
  addBotMsg(`✅ Perfect, <strong>${name}</strong>! A senior agent will reach you on <strong>${phone}</strong> within 2 hours. In the meantime, feel free to keep asking questions — I'm here!`);
  // In production: POST { name, phone, email } to your CRM / webhook here
  console.log('LEAD:', { name, phone, email });
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function callClaude(userMsg) {
  history.push({ role: 'user', content: userMsg });

  showTyping();

  // If no API key, use smart fallback
  if (!API_KEY) {
    await new Promise(r => setTimeout(r, 1200 + Math.random() * 800));
    removeTyping();
    const reply = getFallbackReply(userMsg);
    history.push({ role: 'assistant', content: reply });
    addBotMsg(reply);
    msgCount++;
    if (msgCount === 3 && !leadCaptured) showLeadCapture();
    return;
  }

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 300,
        system: SYSTEM,
        messages: history
      })
    });
    const data = await res.json();
    removeTyping();
    const reply = data.content?.[0]?.text || "I'm looking into that for you — could you give me a bit more detail?";
    history.push({ role: 'assistant', content: reply });
    addBotMsg(reply);
    msgCount++;
    if (msgCount === 3 && !leadCaptured) showLeadCapture();
  } catch(e) {
    removeTyping();
    addBotMsg("I'm having a brief connection issue. Please try again in a moment.");
  }
}

function getFallbackReply(msg) {
  const m = msg.toLowerCase();
  if (m.includes('buy') || m.includes('purchase')) return "Great choice to explore buying! 🏠 Whether it's your first home or an investment, the process typically takes 30–60 days from offer to close. What's your target budget range?";
  if (m.includes('sell') || m.includes('selling')) return "Selling smart starts with the right pricing strategy. Overpriced homes sit; underpriced ones leave money behind. I can walk you through a market-based valuation. What's the property address or area?";
  if (m.includes('price') || m.includes('cost') || m.includes('budget')) return "Prices depend on location, size, and market conditions. For most areas I cover, entry-level homes start around the low hundreds, with luxury properties going much higher. What's your budget range so I can narrow things down?";
  if (m.includes('view') || m.includes('visit') || m.includes('schedule')) return "📅 I can arrange a viewing within 24–48 hours. Which property caught your eye, and what days work best for you?";
  if (m.includes('loan') || m.includes('mortgage') || m.includes('finance') || m.includes('pre-approval')) return "Pre-approval is your first power move in buying. It shows sellers you're serious and defines your real budget. Have you spoken with a lender yet, or would you like guidance on what to prepare?";
  if (m.includes('first time') || m.includes('first-time')) return "First-time buyers are in good hands here. I'll walk you step-by-step: pre-approval → search → offer → inspection → close. What city or area are you targeting?";
  if (m.includes('new listing') || m.includes('available') || m.includes('listing')) return "New listings come in daily. 🔑 I can match you with fresh properties the moment they hit. What type of property are you looking for — apartment, villa, townhouse?";
  if (m.includes('closing cost') || m.includes('fees')) return "Closing costs typically run 2–5% of the purchase price, covering legal fees, title insurance, and lender charges. On a $300K home, expect $6K–$15K. Want a more precise estimate based on your situation?";
  if (m.includes('offer') || m.includes('negotiat')) return "Making an offer below asking price is common — especially in a buyer's market. The key is backing your number with comparable sales data. Would you like to talk through an offer strategy?";
  if (m.includes('document') || m.includes('paperwork')) return "For buyers: government ID, 3-months bank statements, proof of income, and credit history. For sellers: title deeds, recent utility bills, and any renovation records. Which side are you on?";
  if (m.includes('worth') || m.includes('value') || m.includes('valuation')) return "A home's value depends on size, condition, location, and recent comparable sales nearby. Share your address or area and I'll give you a realistic estimate range.";
  if (m.includes('area') || m.includes('neighborhood') || m.includes('location')) return "The right area depends on your priorities — commute, schools, lifestyle, or investment potential. Tell me what matters most to you and I'll suggest 2–3 ideal neighborhoods.";
  if (m.includes('rent') || m.includes('rental')) return "Looking to rent or lease out a property? Rental markets have shifted significantly. Are you searching for a rental yourself, or considering listing a property as a landlord?";
  if (m.includes('hello') || m.includes('hi') || m.includes('hey')) return "Welcome! I'm PropAI — your real estate guide. 🏡 Whether you're buying, selling, or just exploring, I'll get you to the right answer fast. What's on your mind?";
  return "That's a great question. To give you the most accurate answer, could you share a bit more context — like your location, budget, or whether you're buying or selling? I'll take it from there.";
}

function sendMsg() {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  autoResize(inputEl);
  chipsEl.style.display = 'none';
  addUserMsg(text);
  callClaude(text);
}

function sendChip(btn) {
  const text = btn.textContent.replace(/^[\u{1F000}-\u{1FFFF}🏠💰📅🏷️📋🔑]\s*/u,'').trim();
  chipsEl.style.display = 'none';
  addUserMsg(text);
  callClaude(text);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// Welcome message
setTimeout(() => {
  addBotMsg(`Hi 👋 I'm <strong>PropAI</strong> — your personal real estate expert.<br><br>Tell me your <strong>budget</strong>, preferred <strong>location</strong>, and whether you want to <strong>buy or sell</strong>. I'll guide you to the best options instantly.`);
}, 400);
</script>
</body>
</html>
